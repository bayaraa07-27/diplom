services:
  mongodb:
    image: mongo:7
    container_name: face_attendance_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: face_attendance
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: face_attendance_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - face_data:/app/face_data
      - model_data:/app/models
    environment:
      MONGO_URI: mongodb://mongodb:27017/face_attendance
      JWT_SECRET_KEY: change-this-secret-in-production
      FLASK_ENV: production
      FLASK_PORT: "5000"
      CORS_ORIGINS: http://localhost:3000
      FACE_USE_CNN: "false"        # true болгоход CNN model ашиглана (GPU шаардлагатай)
      TZ: Asia/Ulaanbaatar
    depends_on:
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1500M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face_attendance_ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  face_data:
  model_data: