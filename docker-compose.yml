version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: face_attendance_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: face_attendance

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: face_attendance_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - face_data:/app/face_data
    environment:
      MONGO_URI: mongodb://mongodb:27017/face_attendance
      JWT_SECRET_KEY: change-this-secret-in-production
      FLASK_ENV: development
      FLASK_PORT: "5000"
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face_attendance_ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
  face_data:
